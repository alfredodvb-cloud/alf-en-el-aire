<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alf en el aire">
<title>Alf en el aire</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');
:root{--sky:#0ea5e9;--sky-dark:#0369a1;--night:#0f172a;--mid:#1e293b;--slate:#64748b;--green:#10b981;--amber:#f59e0b;--purple:#8b5cf6;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--night);color:#fff;min-height:100vh;max-width:480px;margin:0 auto;font-size:15px;}
/* HEADER */
.header{background:linear-gradient(135deg,#0f172a,#0c1a2e);border-bottom:1px solid rgba(14,165,233,0.15);padding:16px 16px 12px;padding-top:calc(16px + env(safe-area-inset-top));position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-plane{font-size:26px;display:inline-block;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-4px) rotate(5deg)}}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;}
.logo-text span{color:var(--sky);}
.alf-btn{background:rgba(14,165,233,0.15);border:1px solid rgba(14,165,233,0.35);color:#7dd3fc;border-radius:20px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background 0.2s;}
.alf-btn:hover{background:rgba(14,165,233,0.28);}
.nav-row{display:flex;align-items:center;gap:8px;margin-top:11px;}
.month-btn{background:rgba(255,255,255,0.06);border:none;color:#94a3b8;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;}
.month-label{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:#cbd5e1;min-width:94px;text-align:center;}
.view-toggle{flex:1;display:flex;background:rgba(255,255,255,0.04);border-radius:9px;padding:3px;gap:3px;}
.view-btn{flex:1;padding:6px 2px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#475569;transition:all 0.2s;}
.view-btn.active{background:rgba(14,165,233,0.2);color:#7dd3fc;}
/* STATUS */
.status-card{margin:12px 16px 0;border-radius:14px;padding:15px 16px;position:relative;display:none;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.status-close{position:absolute;top:10px;right:10px;background:rgba(255,255,255,0.07);border:none;color:#64748b;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:15px;}
.status-emoji{font-size:32px;margin-bottom:7px;}
.status-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;}
.status-detail{font-size:14px;color:#94a3b8;line-height:1.65;}
.status-local-time{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:8px;padding:6px 12px;font-size:13px;color:#c4b5fd;}
.fr-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:var(--sky);color:#fff;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;}
.s-flying{background:linear-gradient(135deg,#0c2d48,#0d3a5e);border:1px solid rgba(14,165,233,0.4);}
.s-ground{background:linear-gradient(135deg,#0a2a1a,#0d3320);border:1px solid rgba(16,185,129,0.4);}
.s-sim{background:linear-gradient(135deg,#2d1b4e,#3d1f6e);border:1px solid rgba(139,92,246,0.4);}
.s-airport{background:linear-gradient(135deg,#2d1f0d,#3d2a0f);border:1px solid rgba(245,158,11,0.4);}
.s-rest{background:linear-gradient(135deg,#1e293b,#263348);border:1px solid rgba(100,116,139,0.3);}
/* MAP */
.map-container{margin-top:12px;border-radius:12px;overflow:hidden;height:200px;position:relative;border:1px solid rgba(14,165,233,0.2);}
.map-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,0.8);font-size:13px;color:#94a3b8;z-index:10;}
.map-plane-icon{font-size:22px;filter:drop-shadow(0 0 6px rgba(14,165,233,0.8));}
/* COUNTDOWN */
.countdown{margin:10px 16px 0;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 15px;display:flex;align-items:center;gap:11px;font-size:14px;color:#94a3b8;line-height:1.55;}
.countdown-icon{font-size:22px;flex-shrink:0;}
/* UPLOAD */
.upload-wrap{padding:11px 16px 0;}
.upload-btn{width:100%;background:rgba(255,255,255,0.04);border:1.5px dashed rgba(255,255,255,0.12);color:#64748b;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.2s;}
.upload-btn:hover{border-color:var(--sky);color:#7dd3fc;}
.upload-msg{font-size:13px;text-align:center;margin-top:6px;}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:11px 16px 0;}
.stat{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 6px;text-align:center;}
.stat-n{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--sky);}
.stat-l{font-size:10px;color:var(--slate);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;}
/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:11px 16px 0;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b;}
.leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.leg-on{width:20px;height:11px;border-radius:3px;background:rgba(14,165,233,0.2);border-bottom:3px solid var(--amber);flex-shrink:0;}
/* CALENDAR */
.cal-wrap{padding:13px 16px 32px;}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px;}
.cal-days-header div{text-align:center;font-size:11px;font-weight:600;color:#475569;padding:4px 0;text-transform:uppercase;letter-spacing:0.04em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.1s;min-height:44px;border:1px solid rgba(255,255,255,0.05);}
.cal-day:hover{transform:scale(1.07);}
.cal-day.empty{background:transparent;cursor:default;border:none;}
.cal-day.empty:hover{transform:none;}
.cal-day.today{box-shadow:0 0 0 2px var(--sky);}
.cal-day.overnight{border-bottom:3px solid var(--amber)!important;}
.day-num{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;line-height:1;}
.day-icon{font-size:11px;margin-top:2px;}
.t-flight{background:linear-gradient(135deg,#0c2d48,#0d3a5e);border-color:rgba(14,165,233,0.3)!important;} .t-flight .day-num{color:#7dd3fc;}
.t-layover{background:rgba(14,165,233,0.08);border-color:rgba(14,165,233,0.15)!important;} .t-layover .day-num{color:#7dd3fc;}
.t-arrival{background:rgba(14,165,233,0.05);border-color:rgba(14,165,233,0.12)!important;} .t-arrival .day-num{color:#93c5fd;}
.t-sim{background:linear-gradient(135deg,#2d1b4e,#3d1f6e);border-color:rgba(139,92,246,0.3)!important;} .t-sim .day-num{color:#c4b5fd;}
.t-airport,.t-emg{background:linear-gradient(135deg,#2d1f0d,#3d2a0f);border-color:rgba(245,158,11,0.3)!important;} .t-airport .day-num,.t-emg .day-num{color:#fcd34d;}
.t-blank{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.2)!important;} .t-blank .day-num{color:#fca5a5;}
.t-free{background:rgba(16,185,129,0.1);} .t-free .day-num{color:#6ee7b7;}
.t-free-req{background:rgba(5,150,105,0.07);} .t-free-req .day-num{color:#34d399;}
/* LIST */
.list-wrap{padding:8px 16px 32px;display:none;}
.gantt-axis{display:flex;justify-content:space-between;padding:0 0 5px 62px;font-size:10px;color:#334155;}
.list-row{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;border-radius:6px;transition:background 0.15s;}
.list-row:hover{background:rgba(255,255,255,0.03);}
.list-d{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#475569;min-width:24px;text-align:right;}
.list-d.today{color:var(--sky);}
.list-dn{font-size:10px;color:#334155;min-width:22px;}
.gantt-track{flex:1;height:26px;position:relative;background:rgba(255,255,255,0.03);border-radius:5px;overflow:hidden;}
.gbar{position:absolute;top:3px;height:20px;border-radius:3px;display:flex;align-items:center;padding:0 4px;font-size:9px;color:rgba(255,255,255,0.6);white-space:nowrap;overflow:hidden;}
.list-lbl{font-size:11px;min-width:92px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* FRIDGE */
.fridge-wrap{padding:12px 16px 32px;display:none;}
.print-btn{width:100%;background:linear-gradient(135deg,var(--sky),var(--sky-dark));color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
#fridgeTable{width:100%;border-collapse:collapse;font-size:12px;}
#fridgeTable th{padding:7px 7px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;border-bottom:2px solid rgba(14,165,233,0.3);}
#fridgeTable td{padding:6px 7px;font-size:12px;color:#cbd5e1;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:top;}
#fridgeTable .fd{color:#94a3b8;font-weight:700;white-space:nowrap;}
#fridgeTable .fa{font-weight:600;color:#e2e8f0;}
#fridgeTable .ft{color:#cbd5e1;}
#fridgeTable .fc{color:#94a3b8;}
#fridgeTable .fon{color:var(--amber);}
#fridgeTable .fdh{color:#64748b;}
#fridgeTable .frow-today td{color:#7dd3fc;}
/* PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;display:none;backdrop-filter:blur(2px);}
.overlay.open{display:block;}
.panel{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#1e293b;border-top:1px solid rgba(14,165,233,0.15);border-radius:20px 20px 0 0;padding:18px 18px 44px;z-index:200;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);}
.panel.open{transform:translateY(0);}
.panel-handle{width:32px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 16px;}
.panel-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.07);border:none;color:#64748b;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;}
.panel-date{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--sky);margin-bottom:5px;}
.panel-title{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;margin-bottom:14px;}
.panel-msg{background:linear-gradient(135deg,rgba(14,165,233,0.08),rgba(139,92,246,0.08));border:1px solid rgba(14,165,233,0.2);border-radius:12px;padding:13px 15px;margin-bottom:12px;font-size:14px;line-height:1.65;color:#cbd5e1;font-style:italic;}
.info-box{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;margin-bottom:9px;font-size:14px;line-height:1.7;color:#cbd5e1;}
.info-box strong{color:#fff;}
.report-box{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:11px 14px;margin-bottom:11px;font-size:14px;color:#fbbf24;line-height:1.6;}
.flight-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;}
.fc-route{flex:1;}
.fc-cities{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.fc-arrow{color:var(--sky);}
.fc-times{font-size:13px;color:#64748b;}
.fc-num{font-family:monospace;font-size:12px;font-weight:700;color:var(--sky);background:rgba(14,165,233,0.12);padding:3px 9px;border-radius:6px;white-space:nowrap;}
.badge{font-size:12px;padding:2px 8px;border-radius:5px;display:inline-block;margin-top:3px;}
.badge-on{color:var(--amber);background:rgba(245,158,11,0.12);}
.badge-dh{color:#94a3b8;background:rgba(100,116,139,0.12);}
.local-time-box{background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.25);border-radius:10px;padding:10px 14px;margin-bottom:9px;font-size:14px;color:#c4b5fd;display:flex;align-items:center;gap:8px;}
.blank-note{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:11px 13px;margin-top:8px;font-size:13px;color:#fca5a5;line-height:1.65;}
.alarm-box{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:10px 14px;margin-bottom:9px;font-size:14px;color:#fbbf24;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <span class="logo-plane">✈️</span>
      <span class="logo-text">Alf<span> en el aire</span></span>
    </div>
    <button class="alf-btn" onclick="whereIsAlf()">🔍 ¿Dónde está Alf ahora?</button>
  </div>
  <div class="nav-row">
    <button class="month-btn" onclick="prevMonth()">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="month-btn" onclick="nextMonth()">›</button>
    <div class="view-toggle">
      <button class="view-btn active" id="vbCal" onclick="setView('cal')">📅 Calendario</button>
      <button class="view-btn" id="vbList" onclick="setView('list')">📋 Lista</button>
      <button class="view-btn" id="vbFridge" onclick="setView('fridge')">🖨️ Refri</button>
    </div>
  </div>
</div>

<div class="status-card" id="statusCard">
  <button class="status-close" onclick="document.getElementById('statusCard').style.display='none'">×</button>
  <div class="status-emoji" id="sEmoji"></div>
  <div class="status-title" id="sTitle"></div>
  <div class="status-detail" id="sDetail"></div>
  <div id="sLocalTime"></div>
  <div id="sMapContainer"></div>
  <div id="sLink"></div>
</div>

<div class="countdown" id="countdown"><span class="countdown-icon" id="cdIcon">📆</span><span id="cdText"></span></div>

<div class="upload-wrap">
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📤 Actualizar rol (Excel de LATAM)</button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(event)">
  <div class="upload-msg" id="uploadMsg"></div>
</div>

<div class="stats" id="stats"></div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:rgba(14,165,233,0.5)"></div>Vuelo</div>
  <div class="leg"><div class="leg-dot" style="background:rgba(139,92,246,0.5)"></div>Simulador</div>
  <div class="leg"><div class="leg-dot" style="background:rgba(245,158,11,0.4)"></div>Aeropuerto/Cap.</div>
  <div class="leg"><div class="leg-dot" style="background:rgba(16,185,129,0.4)"></div>Día libre</div>
  <div class="leg"><div class="leg-dot" style="background:rgba(239,68,68,0.25)"></div>De blanco</div>
  <div class="leg"><div class="leg-on"></div>Pernocte fuera</div>
</div>

<div class="cal-wrap" id="calView">
  <div class="cal-days-header">
    <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="list-wrap" id="listView">
  <div class="gantt-axis"><span>00</span><span>03</span><span>06</span><span>09</span><span>12</span><span>15</span><span>18</span><span>21</span><span>24</span></div>
  <div id="listGrid"></div>
</div>

<div class="fridge-wrap" id="fridgeView">
  <button class="print-btn" onclick="printFridge()">🖨️ Imprimir para el refrigerador (carta)</button>
  <div id="fridgeTableWrap">
    <table id="fridgeTable">
      <thead><tr><th>Fecha</th><th>Actividad</th><th>Salida</th><th>Llegada</th><th>Desde</th><th>Hasta</th><th></th></tr></thead>
      <tbody id="fridgeTbody"></tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <button class="panel-close" onclick="closePanel()">×</button>
  <div class="panel-handle"></div>
  <div class="panel-date" id="panelDate"></div>
  <div class="panel-title" id="panelTitle"></div>
  <div id="panelBody"></div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const CITIES={SCL:"Santiago",ANF:"Antofagasta",CJC:"Calama",GRU:"São Paulo",PMC:"Puerto Montt",LSC:"La Serena",CCP:"Concepción",ZCO:"Temuco",IQQ:"Iquique",ARI:"Arica",BBA:"Balmaceda",LPB:"La Paz",MVD:"Montevideo",EZE:"Buenos Aires",LIM:"Lima",BOG:"Bogotá",MIA:"Miami",MAD:"Madrid"};
const AC_T={"321":"Airbus A321","320":"Airbus A320","31R":"Airbus A319/321","328":"Airbus A320 Neo","B738":"Boeing 737-800","789":"Boeing 787-9"};
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_S=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const DAYS_F=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const TYPE_ICON={flight:"✈️",layover:"🏨",arrival:"🛬",sim:"🎮",airport:"🏢",emg:"📋",blank:"📞",free:"","free-req":""};
const TYPE_LBL={flight:"Vuelo",layover:"Pernocte",arrival:"Llegada madrugada",sim:"Simulador",airport:"Aeropuerto",emg:"Capacitación",blank:"De blanco",free:"Día libre","free-req":"Libre requerido"};

// Airport coords for map
const AIRPORT_COORDS={
  SCL:[-33.393,-70.786],ANF:[-23.444,-70.445],CJC:[-22.498,-68.904],
  GRU:[-23.432,-46.469],PMC:[-41.438,-73.094],LSC:[-29.916,-71.199],
  CCP:[-36.772,-73.059],ZCO:[-38.769,-72.637],IQQ:[-20.535,-70.181],
  ARI:[-18.348,-70.338],BBA:[-45.916,-71.686],LPB:[-16.514,-68.192],
  MVD:[-34.838,-56.031],EZE:[-34.822,-58.535],LIM:[-12.022,-77.114],
  BOG:[4.701,-74.147],MIA:[25.796,-80.287],MAD:[40.472,-3.561]
};

// Timezone offsets for destinations (UTC offset in hours, approximate)
const TZ_OFFSET={
  SCL:-4,ANF:-4,CJC:-4,PMC:-4,LSC:-4,CCP:-4,ZCO:-4,IQQ:-5,ARI:-5,BBA:-4,
  GRU:-3,MVD:-3,EZE:-3,LIM:-5,BOG:-5,MIA:-4,MAD:2,LPB:-4
};

function city(c){return CITIES[c?.trim()]||c||"";}
function toMin(t){if(!t)return 0;const[h,m]=(t+"").replace(/[^\d:]/g,"").split(":").map(Number);return(h||0)*60+(m||0);}
function minToLeft(m){return Math.min((m/1440)*100,100)+"%";}
function minToW(s,e){let w=e-s;if(w<0)w+=1440;return Math.min((w/1440)*100,100)+"%";}
function hasON(d){return d&&(d.overnight||d.flights?.some(f=>f.overnight));}
function fmtHome(rt){const rm=toMin(rt)-75;const h=Math.floor(((rm%1440)+1440)%1440/60).toString().padStart(2,"0");const m=(((rm%1440)+1440)%1440%60).toString().padStart(2,"0");return h+":"+m;}
function fmtAlarm(firstDep){const rm=toMin(firstDep)-210;const h=Math.floor(((rm%1440)+1440)%1440/60);const m2=(((rm%1440)+1440)%1440%60).toString().padStart(2,"0");return h+":"+m2;}
function isEarlyFlight(firstDep){const depMin=toMin(firstDep);const alarmMin=depMin-210;const alarmH=Math.floor(((alarmMin%1440)+1440)%1440/60);return alarmH<6;}
function getLocalTime(iataCode){
  const offset=TZ_OFFSET[iataCode];
  if(offset===undefined)return null;
  const now=new Date();
  const utc=now.getTime()+now.getTimezoneOffset()*60000;
  const local=new Date(utc+offset*3600000);
  return local.getHours().toString().padStart(2,"0")+":"+local.getMinutes().toString().padStart(2,"0");
}

// ── CUSTOM MESSAGES ────────────────────────────────────────
function getDayMessage(dd,d){
  if(!dd)return null;
  const type=dd.type;
  if(type==="free"||type==="free-req")return null;
  if(type==="arrival")return`😴 Alf llegó de madrugada con el vuelo ${dd.fromFlight?.num}. Merece descansar, ¡no lo llamen muy temprano!`;
  if(type==="layover"){const lt=getLocalTime(dd.city);const ltStr=lt?` Son las ${lt} hora local.`:"";return`🌙 Esta noche Alf duerme en ${dd.cityName}.${ltStr} Regresa mañana.`;}
  if(type==="blank")return`📞 Alf está de blanco: la aerolínea puede llamarlo en cualquier momento entre las 03:00 y 21:00. Si no llaman antes de las 21:00 del día anterior, ¡queda libre!`;
  if(type==="airport")return`🏢 Alf tiene turno de guardia en el aeropuerto. Está disponible por si alguna tripulación lo necesita como refuerzo.`;
  if(type==="emg")return`📋 Hoy toca capacitación obligatoria en emergencias. Aunque suena serio, es entrenamiento en tierra, sin aviones ni pasajeros.`;
  if(type==="sim"){
    if(dd.simType==="LOE")return`🎮 ¡Hoy es el examen del simulador! El LOE es la evaluación más importante del año. Alf lo tiene bien preparado. 💪`;
    if(dd.simType==="MV")return`🎮 Hoy practica maniobras de vuelo en el simulador. Una réplica exacta de la cabina, sin riesgos reales.`;
    return`🎮 Alf tiene simulador hoy — entrenamiento en tierra en una réplica exacta de la cabina del avión.`;
  }
  if(dd.flights?.length){
    const opFlights=dd.flights.filter(f=>!f.dh);
    const fc=opFlights.length;
    const firstDep=opFlights[0]?.depTime;
    const isEarly=firstDep&&isEarlyFlight(firstDep);
    const alarm=firstDep?fmtAlarm(firstDep):"";
    const destinations=[...new Set(opFlights.map(f=>city(f.arr)).filter(c=>c!=="Santiago"))];
    if(isEarly)return`⏰ ¡Día de madrugón! El despertador suena a las ${alarm}. ${fc===1?"Un vuelo hoy":fc+" vuelos hoy"}${destinations.length?` — pasa por ${destinations.join(" y ")}`:""}.`;
    if(fc===4)return`✈️ ¡Día intenso! Cuatro vuelos hoy${destinations.length?` pasando por ${destinations.join(", ")}`:""}.  Llega a casa alrededor de las ${opFlights[opFlights.length-1]?.arrTime}.`;
    if(hasON(dd)){const lf=opFlights[opFlights.length-1];return`🌙 Hoy Alf viaja a ${city(lf?.arr)} y no vuelve a casa esta noche. Pernocta en hotel de LATAM.`;}
    return`✈️ ${fc===1?"Un vuelo hoy":"Varios vuelos hoy"} — sale a las ${firstDep}${destinations.length?` hacia ${destinations[0]}`:""}.`;
  }
  return null;
}

// ── OPENSKY MAP ────────────────────────────────────────────
let mapInstance=null;
let mapMarker=null;
let mapLine=null;

function destroyMap(){
  if(mapInstance){mapInstance.remove();mapInstance=null;mapMarker=null;mapLine=null;}
}

async function showFlightMap(flight){
  const container=document.getElementById("sMapContainer");
  container.innerHTML=`<div class="map-container"><div class="map-loading" id="mapLoading">🛰️ Buscando posición real...</div><div id="leafletMap" style="width:100%;height:200px;"></div></div>`;

  const depCoords=AIRPORT_COORDS[flight.dep];
  const arrCoords=AIRPORT_COORDS[flight.arr];
  if(!depCoords||!arrCoords){container.innerHTML="";return;}

  // Calculate interpolated position based on time
  const now=new Date();
  const cur=now.getHours()*60+now.getMinutes();
  const depMin=toMin(flight.depTime);
  const arrMin=toMin(flight.arrTime)+(flight.nextDay?1440:0);
  const progress=Math.max(0,Math.min(1,(cur-depMin)/(arrMin-depMin)));
  const estLat=depCoords[0]+(arrCoords[0]-depCoords[0])*progress;
  const estLng=depCoords[1]+(arrCoords[1]-depCoords[1])*progress;

  destroyMap();
  await new Promise(r=>setTimeout(r,100));

  try{
    mapInstance=L.map("leafletMap",{zoomControl:false,attributionControl:false}).setView([estLat,estLng],5);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(mapInstance);

    // Route line
    mapLine=L.polyline([depCoords,[estLat,estLng],arrCoords],{color:"#0ea5e9",weight:2,opacity:0.6,dashArray:"6,4"}).addTo(mapInstance);

    // Airport markers
    const airportIcon=L.divIcon({html:`<div style="width:8px;height:8px;border-radius:50%;background:#0ea5e9;border:2px solid #fff;box-shadow:0 0 6px rgba(14,165,233,0.8)"></div>`,iconSize:[8,8],iconAnchor:[4,4],className:""});
    L.marker(depCoords,{icon:airportIcon}).addTo(mapInstance).bindTooltip(city(flight.dep),{permanent:true,direction:"bottom",className:"leaflet-tooltip-dark",offset:[0,4]});
    L.marker(arrCoords,{icon:airportIcon}).addTo(mapInstance).bindTooltip(city(flight.arr),{permanent:true,direction:"bottom",className:"leaflet-tooltip-dark",offset:[0,4]});

    // Try OpenSky for real position
    document.getElementById("mapLoading").textContent="✈️ Conectando con OpenSky...";
    let realPos=null;
    try{
      const callsign=flight.num.replace("LA","LA").padEnd(8," ");
      const resp=await fetch(`https://opensky-network.org/api/states/all?callsign=${encodeURIComponent(callsign.trim())}`,{signal:AbortSignal.timeout(5000)});
      if(resp.ok){
        const data=await resp.json();
        if(data.states&&data.states.length>0){
          const s=data.states[0];
          if(s[6]&&s[5]){realPos={lat:s[6],lng:s[5],heading:s[10]||0};}
        }
      }
    }catch(e){}

    const pos=realPos||{lat:estLat,lng:estLng,heading:0};
    const isReal=!!realPos;

    // Plane icon
    const planeIcon=L.divIcon({
      html:`<div style="font-size:24px;transform:rotate(${pos.heading}deg);filter:drop-shadow(0 0 8px rgba(14,165,233,0.9));text-shadow:0 0 10px #0ea5e9">✈️</div>`,
      iconSize:[30,30],iconAnchor:[15,15],className:""
    });
    mapMarker=L.marker([pos.lat,pos.lng],{icon:planeIcon}).addTo(mapInstance);
    mapInstance.setView([pos.lat,pos.lng],5);

    const loadingEl=document.getElementById("mapLoading");
    if(loadingEl)loadingEl.style.display="none";

    // Add note about data source
    const note=document.createElement("div");
    note.style.cssText="position:absolute;bottom:6px;left:8px;font-size:10px;color:rgba(255,255,255,0.5);z-index:1000;pointer-events:none;";
    note.textContent=isReal?"📡 Posición real via OpenSky":"📍 Posición estimada por horario";
    document.querySelector(".map-container").style.position="relative";
    document.querySelector(".map-container").appendChild(note);

  }catch(e){
    const loadingEl=document.getElementById("mapLoading");
    if(loadingEl)loadingEl.style.display="none";
  }
}

// ── EXCEL PARSER ───────────────────────────────────────────
function parseExcel(buffer){
  const wb=XLSX.read(new Uint8Array(buffer),{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  let flyingHrs="",dutyHrs="";
  for(let i=0;i<Math.min(5,rows.length);i++){
    const j=rows[i].join(" ");
    const fh=j.match(/FLYING HRS\s*([\d:]+)/i);const dh=j.match(/DUTY HRS\s*([\d:]+)/i);
    if(fh)flyingHrs=fh[1];if(dh)dutyHrs=dh[1];
  }
  let hi=rows.findIndex(r=>r.some(c=>String(c).includes("Date")||String(c).includes("Item")));
  if(hi<0)hi=1;
  const days={};let curDate=null;
  const mmap={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];
    const rd=String(r[0]||"").trim();
    if(rd.match(/\d{2}-[A-Za-z]{3}-\d{4}/)){
      const p=rd.split("-");curDate={d:parseInt(p[0]),m:mmap[p[1].toLowerCase()]||6,y:parseInt(p[2])};
    }
    if(!curDate)continue;
    const key=curDate.y+"-"+curDate.m+"-"+curDate.d;
    const pairing=String(r[1]||"").trim();
    const report=String(r[2]||"").trim();
    const flNum=String(r[3]||"").trim();
    const wt=String(r[5]||"").trim();
    const depRaw=String(r[7]||"").trim();
    const arrRaw=String(r[8]||"").trim();
    const ac=String(r[14]||"").trim();
    const isFL=!!flNum.match(/^[A-Z]{2}\d+$/);
    const actU=pairing.toUpperCase();
    const parseLeg=raw=>{const m=raw.match(/([A-Z]{3})\s+(\d{1,2}:\d{2})/);return m?{code:m[1],time:m[2]}:{code:"",time:""};};
    const dep=parseLeg(depRaw),arr=parseLeg(arrRaw);
    const nextDay=arrRaw.includes("+1");
    if(!days[key]){
      let type="free";
      if(actU==="DO")type="free";
      else if(actU==="DR")type="free-req";
      else if(actU.startsWith("ASB"))type="airport";
      else if(actU.match(/^R[A-Z]+_CL/))type="sim";
      else if(actU==="B")type="blank";
      else if(actU==="EMG")type="emg";
      else if(isFL)type="flight";
      let simType="";
      if(type==="sim"){if(actU.includes("APT"))simType="APT";else if(actU.includes("MV"))simType="MV";else if(actU.includes("LOE"))simType="LOE";else simType=pairing.replace(/[^A-Z]/g,"");}
      days[key]={type,month:curDate.m,year:curDate.y,day:curDate.d,reportTime:report||null,flights:[],simType,hours:null,detail:"",overnight:false};
    }
    const de=days[key];
    if(isFL&&de.type==="free")de.type="flight";
    if(dep.time&&arr.time&&!isFL)de.hours=[dep.time,arr.time];
    if(isFL&&dep.code&&arr.code){
      const on=nextDay||arrRaw.includes("SI");
      de.flights.push({num:flNum,dep:dep.code,arr:arr.code,depTime:dep.time,arrTime:arr.time,nextDay,ac,dh:wt==="PS",overnight:on});
      if(on)de.overnight=true;
    }
  }
  const keys=Object.keys(days).sort();
  for(let i=1;i<keys.length;i++){
    const prev=days[keys[i-1]],curr=days[keys[i]];
    if(!prev||!curr)continue;
    const ndBase=prev.flights?.find(f=>f.nextDay&&f.arr==="SCL");
    const ndOther=prev.flights?.find(f=>f.nextDay&&f.arr!=="SCL");
    if(ndBase&&!curr.flights?.length&&curr.type==="free"){
      curr.type="arrival";curr.fromFlight={num:ndBase.num,dep:ndBase.dep,arr:ndBase.arr,arrTime:ndBase.arrTime};
    }else if(ndOther&&!curr.flights?.length&&curr.type==="free"){
      curr.type="layover";curr.cityName=city(ndOther.arr);curr.city=ndOther.arr;
    }else if(prev.overnight&&!curr.flights?.length&&curr.type==="free"){
      const lf=prev.flights[prev.flights.length-1];
      if(lf){curr.type="layover";curr.cityName=city(lf.arr);curr.city=lf.arr;}
    }
  }
  const months={};
  Object.values(days).forEach(d=>{
    const mk=d.year+"-"+d.month;
    if(!months[mk])months[mk]={year:d.year,month:d.month,flyingHrs,dutyHrs,days:{}};
    months[mk].days[d.day]=d;
  });
  return months;
}

async function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const msg=document.getElementById("uploadMsg");
  msg.style.color="#94a3b8";msg.textContent="⏳ Leyendo archivo...";
  try{
    const buf=await file.arrayBuffer();
    const months=parseExcel(buf);
    Object.assign(allMonths,months);
    saveData();
    const keys=Object.keys(months);
    if(keys.length){const[y,m]=keys[0].split("-").map(Number);curYear=y;curMonth=m;}
    msg.style.color="#10b981";msg.textContent="✅ Rol actualizado correctamente";
    renderAll();
  }catch(err){msg.style.color="#ef4444";msg.textContent="❌ Error al leer. Intenta de nuevo.";console.error(err);}
  setTimeout(()=>msg.textContent="",4000);
  e.target.value="";
}

    else if(dd?.flights?.length){
      if(dd.reportTime){const rs=toMin(dd.reportTime),fd2=toMin(dd.flights[0].depTime);bars+=`<div class="gbar" style="left:${minToLeft(rs)};width:${minToW(rs,fd2)};background:rgba(251,191,36,0.08);border:1px dashed rgba(251,191,36,0.25)"></div>`;}
      dd.flights.forEach(f=>{const s=toMin(f.depTime),e=toMin(f.arrTime);bars+=`<div class="gbar" style="left:${minToLeft(s)};width:${minToW(s,Math.min(e+(f.nextDay?1440:0),1440))};background:${f.dh?"rgba(100,116,139,0.3)":"rgba(14,165,233,0.5)"}">${f.dep}→${f.arr}</div>`;});
    }
    html+=`<div class="list-row" onclick="showDay(${d})">
      <span class="list-d${isToday?" today":""}">${d}</span>
      <span class="list-dn">${dn}</span>
      <div class="gantt-track">${bars}</div>
      <span class="list-lbl" style="color:${LC[type]}">${lbl}${on?" 🌙":""}</span>
    </div>`;
  }
  document.getElementById("listGrid").innerHTML=html;
}

// ── FRIDGE ─────────────────────────────────────────────────
function renderFridge(){
  const roster=getRoster();
  const dim=new Date(curYear,curMonth,0).getDate();
  let html="";
  for(let d=1;d<=dim;d++){
    const dd=roster?.days[d];const type=dd?.type||"free";
    const date=new Date(curYear,curMonth-1,d);
    const dn=DAYS_S[date.getDay()];
    const isToday=today.getDate()===d&&today.getMonth()+1===curMonth&&today.getFullYear()===curYear;
    const tc=isToday?" frow-today":"";
    if(!dd||type==="free"||type==="free-req"){
      html+=`<tr class="${tc}"><td class="fd">${d} ${dn}</td><td class="fa" style="color:#4b5563">${type==="free-req"?"DÍA LIBRE (REQUERIDO)":"DÍA LIBRE"}</td><td></td><td></td><td></td><td></td><td></td></tr>`;
    }else if(type==="arrival"){
      html+=`<tr class="${tc}"><td class="fd">${d} ${dn}</td><td class="fdh">🛬 LLEGADA MADRUGADA (${dd.fromFlight?.num||""})</td><td></td><td class="ft">${dd.fromFlight?.arrTime||""}</td><td></td><td class="fc">${city(dd.fromFlight?.arr)}</td><td></td></tr>`;
    }else if(type==="layover"){
      html+=`<tr class="${tc}"><td class="fd">${d} ${dn}</td><td class="fa">🏨 PERNOCTE ${(dd.cityName||"").toUpperCase()}</td><td></td><td></td><td></td><td></td><td></td></tr>`;
    }else if(type==="sim"||type==="airport"||type==="emg"||type==="blank"){
      const lm={sim:`SIMULADOR (${dd.simType})`,airport:"TURNO AEROPUERTO",emg:"EMERGENCIAS GENERALES",blank:"BLANCO"};
      html+=`<tr class="${tc}"><td class="fd">${d} ${dn}</td><td class="fa">${lm[type]||type.toUpperCase()}</td><td class="ft">${dd.hours?.[0]||""}</td><td class="ft">${dd.hours?.[1]||""}</td><td></td><td></td><td></td></tr>`;
    }else if(dd?.flights?.length){
      dd.flights.forEach((f,fi)=>{
        html+=`<tr class="${tc}">
          <td class="fd">${fi===0?d+" "+dn:""}</td>
          <td class="${f.dh?"fdh":"fa"}">${f.dh?"PASAJERO ":""}VUELO ${f.num}</td>
          <td class="ft">${f.depTime}</td>
          <td class="ft">${f.arrTime}${f.nextDay?" (+1)":""}</td>
          <td class="fc">${city(f.dep)}</td>
          <td class="fc">${city(f.arr)}</td>
          <td class="fon">${f.overnight?"🌙":""}</td>
        </tr>`;
      });
    }
  }
  document.getElementById("fridgeTbody").innerHTML=html;
}

function printFridge(){
  const ml=MONTHS[curMonth-1]+" "+curYear;
  const tbl=document.getElementById("fridgeTableWrap").innerHTML;
  const w=window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Rol Alf – ${ml}</title>
  <style>@page{size:letter portrait;margin:15mm 12mm}body{font-family:Arial,sans-serif;font-size:10pt;color:#000}h2{font-size:14pt;margin:0 0 3px}p{font-size:9pt;color:#555;margin:0 0 10px}table{width:100%;border-collapse:collapse}th{background:#0369a1;color:#fff;padding:5px 7px;font-size:9pt;text-align:left}td{padding:4px 7px;font-size:9pt;border-bottom:1px solid #e5e7eb;vertical-align:top}tr:nth-child(even) td{background:#f8fafc}.fdh{color:#9ca3af}.fa{font-weight:700}.frow-today td{background:#eff6ff!important}</style>
  </head><body><h2>✈️ Rol de Alf – ${ml}</h2><p>Primer Oficial LATAM · Impreso el ${new Date().toLocaleDateString("es-CL")}</p>${tbl}</body></html>`);
  w.document.close();setTimeout(()=>w.print(),400);
}

// ── STATS ──────────────────────────────────────────────────
function renderStats(){
  const roster=getRoster();
  if(!roster){document.getElementById("stats").innerHTML="";return;}
  let fd=0,fr=0,sd=0;
  Object.values(roster.days).forEach(d=>{if(d.type==="flight")fd++;if(["free","free-req"].includes(d.type))fr++;if(d.type==="sim")sd++;});
  document.getElementById("stats").innerHTML=
    `<div class="stat"><div class="stat-n">${roster.flyingHrs||"—"}</div><div class="stat-l">Horas vuelo</div></div>
     <div class="stat"><div class="stat-n">${fd}</div><div class="stat-l">Días volando</div></div>
     <div class="stat"><div class="stat-n">${fr}</div><div class="stat-l">Días libres</div></div>
     <div class="stat"><div class="stat-n">${sd}</div><div class="stat-l">Simuladores</div></div>`;
}

// ── COUNTDOWN ──────────────────────────────────────────────
function renderCountdown(){
  const tk=today.getFullYear()+"-"+(today.getMonth()+1);
  const ros=allMonths[tk];
  const el=document.getElementById("countdown");
  if(!ros){el.style.display="none";return;}
  el.style.display="flex";
  const d=today.getDate();
  const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const td=ros.days[d];
  const isFree=!td||["free","free-req","arrival"].includes(td.type);
  let nextAct=null,nextType=null;
  for(let i=d+(isFree?0:1);i<=dim;i++){const dd=ros.days[i];if(dd&&!["free","free-req"].includes(dd.type)){nextAct=i;nextType=dd.type;break;}}
  let freeSince=0;
  for(let i=d;i>=1;i--){const dd=ros.days[i];if(!dd||["free","free-req","arrival"].includes(dd.type))freeSince++;else break;}
  const icon=document.getElementById("cdIcon");
  const txt=document.getElementById("cdText");
  if(isFree&&nextAct){
    const diff=nextAct-d;
    icon.textContent="🏠";
    if(diff===0)txt.innerHTML=`Hoy tiene <strong style="color:#fff">${TYPE_LBL[nextType]||"actividad"}</strong>`;
    else if(diff===1)txt.innerHTML=`Alf lleva <strong style="color:#fff">${freeSince} día${freeSince>1?"s":""} en casa</strong>. Mañana tiene <strong style="color:#fff">${TYPE_LBL[nextType]||"actividad"}</strong>.`;
    else txt.innerHTML=`Alf lleva <strong style="color:#fff">${freeSince} día${freeSince>1?"s":""} en casa</strong>. Próxima actividad en <strong style="color:#fff">${diff} días</strong> (${nextAct} ${MONTHS[curMonth-1].slice(0,3)}).`;
  }else if(!nextAct){
    icon.textContent="😴";txt.innerHTML=`<strong style="color:#fff">Ya terminó de trabajar en ${MONTHS[curMonth-1]}.</strong> El resto del mes está libre.`;
  }else{
    icon.textContent="✈️";txt.innerHTML=`Hoy trabaja Alf. Próxima actividad en <strong style="color:#fff">${nextAct-d} días</strong>.`;
  }
}

// ── WHERE IS ALF ───────────────────────────────────────────
function whereIsAlf(){
  const now=new Date();
  const d=now.getDate(),m=now.getMonth()+1,y=now.getFullYear();
  const cur=now.getHours()*60+now.getMinutes();
  const ros=allMonths[y+"-"+m];
  const card=document.getElementById("statusCard");
  card.style.display="block";
  document.getElementById("sLink").innerHTML="";
  document.getElementById("sLocalTime").innerHTML="";
  document.getElementById("sMapContainer").innerHTML="";
  destroyMap();
  if(!ros){showStatus("rest","📅","Sin datos para hoy",`No hay rol cargado para ${MONTHS[m-1]} ${y}.`);return;}
  const dd=ros.days[d];
  if(!dd||dd.type==="free"||dd.type==="free-req"){showStatus("ground","🏠","Alf está en casa","Hoy es día libre. Está en Santiago descansando con la familia. 🧡");return;}
  if(dd.type==="arrival"){showStatus("ground","🛬","Llegó de madrugada",`El vuelo ${dd.fromFlight?.num} aterrizó a las ${dd.fromFlight?.arrTime}. Está en casa descansando. 😴`);return;}
  if(dd.type==="layover"){
    const lt=getLocalTime(dd.city);
    showStatus("ground","🏨",`Pernocte en ${dd.cityName}`,"Está descansando en el hotel de LATAM. Regresa mañana.");
    if(lt)document.getElementById("sLocalTime").innerHTML=`<div class="status-local-time">🕐 En ${dd.cityName} son las ${lt} hora local</div>`;
    return;
  }
  if(dd.type==="blank"){
    const[s,e]=[toMin(dd.hours?.[0]),toMin(dd.hours?.[1])];
    if(cur>=s&&cur<=e)showStatus("airport","📞","De blanco — disponible",`Puede ser llamado hasta las ${dd.hours?.[1]}. Si no hay llamado antes de las 21:00 del día anterior, queda libre.`);
    else showStatus("ground","🏠","En casa","El turno blanco de hoy ya terminó.");return;
  }
  if(dd.type==="sim"){
    const[s,e]=[toMin(dd.hours?.[0]),toMin(dd.hours?.[1])];
    if(cur>=s&&cur<=e)showStatus("sim","🎮",`En el simulador (${dd.simType})`,dd.detail);
    else showStatus("ground","🏠","En casa",`Tiene simulador hoy (${dd.hours?.[0]}–${dd.hours?.[1]}) pero fuera de horario está en casa.`);return;
  }
  if(dd.type==="airport"||dd.type==="emg"){
    const[s,e]=[toMin(dd.hours?.[0]),toMin(dd.hours?.[1])];
    if(cur>=s&&cur<=e)showStatus("airport","🏢",dd.type==="emg"?"En capacitación":"Turno en aeropuerto",dd.detail||`Horario: ${dd.hours?.[0]}–${dd.hours?.[1]}`);
    else showStatus("ground","🏠","En casa",`Actividad hoy (${dd.hours?.[0]}–${dd.hours?.[1]}) pero fuera de horario está en casa.`);return;
  }
  if(dd.flights?.length){
    for(const f of dd.flights){
      if(f.dh)continue;
      const s=toMin(f.depTime),e=toMin(f.arrTime)+(f.nextDay?1440:0);
      if(cur>=s-20&&cur<=e+30){
        showStatus("flying","✈️","¡Alf está volando ahora!",`${f.num}: ${city(f.dep)} → ${city(f.arr)} · Sale ${f.depTime} · Llega ${f.arrTime}`);
        const lt=getLocalTime(f.arr);
        if(lt)document.getElementById("sLocalTime").innerHTML=`<div class="status-local-time">🕐 En ${city(f.arr)} son las ${lt} hora local</div>`;
        document.getElementById("sLink").innerHTML=`<a class="fr-link" href="https://www.flightradar24.com/search?query=${f.num}" target="_blank">🛰️ Ver en FlightRadar24</a>`;
        showFlightMap(f);
        return;
      }
    }
    const rep=dd.reportTime?toMin(dd.reportTime):null;
    const fd2=toMin(dd.flights[0].depTime);
    const la=toMin(dd.flights[dd.flights.length-1].arrTime);
    if(rep&&cur>=rep&&cur<fd2)showStatus("airport","⏳","Presentándose en aeropuerto",`Llegó a las ${dd.reportTime}. Primer vuelo a las ${dd.flights[0].depTime}.`);
    else if(cur>la+60)showStatus("ground","🏠","Terminó de volar",hasON(dd)?"Está en el hotel en destino. 🏨":"Ya está de vuelta en Santiago. 🏠");
    else{const nxt=dd.flights.find(f=>toMin(f.depTime)>cur);showStatus("ground","🔄","Entre vuelos en tierra",nxt?`Próxima salida a las ${nxt.depTime} de ${city(nxt.dep)} a ${city(nxt.arr)}.`:"Descansando entre tramos.");}
  }
}

function showStatus(type,emoji,title,detail){
  const c=document.getElementById("statusCard");
  c.className="status-card s-"+type;c.style.display="block";
  document.getElementById("sEmoji").textContent=emoji;
  document.getElementById("sTitle").textContent=title;
  document.getElementById("sDetail").innerHTML=detail;
}

// ── DAY PANEL ──────────────────────────────────────────────
function showDay(d){
  const roster=getRoster();const dd=roster?.days[d];
  const date=new Date(curYear,curMonth-1,d);
  document.getElementById("panelDate").textContent=DAYS_F[date.getDay()]+", "+d+" de "+MONTHS[curMonth-1]+" "+curYear;
  let title="",body="";
  const type=dd?.type||"free";
  const msg=getDayMessage(dd,d);
  const msgHtml=msg?`<div class="panel-msg">${msg}</div>`:"";

  if(!dd||type==="free"){title="😴 Día libre";body=`<div class="info-box">Alf está en casa en Santiago, descansando con la familia.</div>`;}
  else if(type==="free-req"){title="🏖️ Libre requerido";body=`${msgHtml}<div class="info-box">Día libre obligatorio por regulación. La empresa protege estos días para garantizar el descanso mínimo de la tripulación.</div>`;}
  else if(type==="arrival"){title="🛬 Llegada de madrugada";body=`${msgHtml}<div class="info-box">El vuelo <strong>${dd.fromFlight?.num}</strong> partió el día anterior y aterrizó en ${city(dd.fromFlight?.arr)} a las <strong>${dd.fromFlight?.arrTime}</strong>.<br><br>Alf llegó de madrugada. El resto del día lo pasa descansando.</div>`;}
  else if(type==="layover"){
    const lt=getLocalTime(dd.city);
    title=`🏨 Pernocte en ${dd.cityName}`;
    body=`${msgHtml}${lt?`<div class="local-time-box">🕐 En ${dd.cityName} son las ${lt} hora local</div>`:""}
    <div class="info-box">Alf está descansando en el hotel de LATAM en <strong>${dd.cityName}</strong>. Llegó ayer y regresa mañana.</div>`;
  }
  else if(type==="blank"){title="📞 De blanco";body=`${msgHtml}<div class="info-box">${dd.detail}<br><br><strong>Franja:</strong> ${dd.hours?.[0]} – ${dd.hours?.[1]}</div><div class="blank-note">💡 Si la aerolínea no avisa antes de las <strong>21:00 del día anterior</strong>, el blanco queda como día libre. La diferencia con un turno normal: en el blanco puede ser llamado en cualquier momento dentro de esa franja.</div>`;}
  else if(type==="sim"){title=`🎮 Simulador ${dd.simType}`;body=`${msgHtml}<div class="info-box">${dd.detail}<br><br><strong>Horario:</strong> ${dd.hours?.[0]} – ${dd.hours?.[1]}<br><br>El simulador es una réplica exacta de la cabina. Alf practica procedimientos de emergencia sin pasajeros ni riesgo real.</div>`;}
  else if(type==="airport"||type==="emg"){title=type==="emg"?"📋 Capacitación":"🏢 Turno aeropuerto";body=`${msgHtml}<div class="info-box">${dd.detail||""}<br><br><strong>Horario:</strong> ${dd.hours?.[0]} – ${dd.hours?.[1]}</div>`;}
  else if(dd.flights?.length){
    const op=dd.flights.filter(f=>!f.dh);
    title=`✈️ ${op.length} vuelo${op.length!==1?"s":""} programado${op.length!==1?"s":""}`;
    body+=msgHtml;
    // Alarm box only for early morning flights
    if(dd.reportTime&&op.length&&isEarlyFlight(op[0].depTime)){
      body+=`<div class="alarm-box">⏰ Despertador a las <strong>${fmtAlarm(op[0].depTime)}</strong> · Sale de casa ~<strong>${fmtHome(dd.reportTime)}</strong> · Se presenta a las <strong>${dd.reportTime}</strong></div>`;
    }else if(dd.reportTime){
      body+=`<div class="report-box">⏰ Sale de casa a las ~<strong>${fmtHome(dd.reportTime)}</strong> · Se presenta en el aeropuerto a las <strong>${dd.reportTime}</strong></div>`;
    }
    dd.flights.forEach(f=>{
      body+=`<div class="flight-card">
        <div class="fc-route">
          <div class="fc-cities"><span>${city(f.dep)}</span><span class="fc-arrow">→</span><span>${city(f.arr)}</span>${f.overnight?`<span class="badge badge-on">🌙 Pernocte</span>`:""}</div>
          <div class="fc-times">🛫 ${f.depTime} · 🛬 ${f.arrTime}${f.nextDay?" (+1)":""} · ${AC_T[f.ac]||f.ac}</div>
          ${f.dh?`<span class="badge badge-dh">Viaja como pasajero de posicionamiento</span>`:""}
        </div>
        <div class="fc-num">${f.num}</div>
      </div>`;
    });
    if(hasON(dd)){const lf=op[op.length-1];body+=`<div class="info-box" style="border-left:3px solid var(--amber)">🌙 <strong>Pernocte en ${city(lf?.arr)}</strong> — duerme en hotel de LATAM y regresa al día siguiente.</div>`;}
  }

  document.getElementById("panelTitle").textContent=title;
  document.getElementById("panelBody").innerHTML=body;
  document.getElementById("panel").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

renderAll();
